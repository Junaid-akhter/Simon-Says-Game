<head>

    <title>Simon Says Game</title>
    <link rel="stylesheet" href="simon.css">
</head>
<body>
    <div>
        <h1>Simon Says Memory Game</h1>
        <h3></h3>
        <h2>Press Start to begin</h2>
        <button id="start-btn">Start Game</button>
        <div class="btn-container">

        </div>
    
    </div>
